
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReStart | Minimal Circular Exchange</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&family=Manrope:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --sage: #f0f4f1;
            --mint: #e2f2e9;
            --stone: #f5f5f4;
            --eco-text: #2d3e35;
            --pet-blue: #3b82f6;
            --metal-gold: #f59e0b;
            --paper-orange: #f97316;
            --glass-teal: #14b8a6;
        }
        body { 
            font-family: 'Manrope', sans-serif; 
            background-color: var(--sage);
            color: var(--eco-text);
            overflow-x: hidden;
            letter-spacing: -0.01em;
        }
        h1, h2, h3, .font-display { 
            font-family: 'DM Sans', sans-serif; 
            font-weight: 500;
        }
        
        .font-bold, .font-semibold, .font-black { font-weight: 500 !important; }
        
        .glass {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .bg-gradient-mesh {
            background: radial-gradient(at 0% 0%, rgba(226, 242, 233, 0.6) 0, transparent 50%),
                        radial-gradient(at 50% 0%, rgba(240, 244, 241, 0.6) 0, transparent 50%),
                        radial-gradient(at 100% 0%, rgba(226, 242, 233, 0.6) 0, transparent 50%);
        }

        .liquid-button {
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .liquid-button::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: rgba(255,255,255,0.15);
            transition: all 0.5s ease;
            z-index: 1;
        }
        .liquid-button:hover::after { left: 0; }

        input:focus + label,
        input:not(:placeholder-shown) + label {
            transform: translateY(-24px) scale(0.85);
            color: #10b981;
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<script type="importmap">

    "framer-motion": "https://esm.sh/framer-motion@11.11.11?external=react,react-dom",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.48.1"
  }
}
</script>

</html>
